<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team View</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <nav>
    <a href="sales-form.html">Sales Form</a>
    <a href="supervisor-dashboard.html" id="supervisorLink" style="display:none;">Supervisor Dashboard</a>
    <a href="team-view.html">Team View</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>

  <h1>Team View</h1>

  <section>
    <h2>Today's Team Summary</h2>
    <table id="todayTable">
      <thead>
        <tr>
          <th>Salesperson</th>
          <th>Sales Today</th>
          <th>Amount</th>
          <th id="lastActivityHeader" style="display:none;">Last Activity</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <section>
    <h2>Monthly Team Summary</h2>
    <table id="monthTable">
      <thead>
        <tr>
          <th>Salesperson</th>
          <th>Total Sales</th>
          <th>Total Amount</th>
          <th>Rank</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <section>
    <h2>Charts</h2>

    <div style="width: 60%; margin: auto;">
      <h3>Monthly Sales (Bar Chart)</h3>
      <canvas id="monthChart"></canvas>
    </div>

    <div style="width: 60%; margin: auto; margin-top: 40px;">
      <h3>Today's Sales Distribution (Pie Chart)</h3>
      <canvas id="todayChart"></canvas>
    </div>
  </section>

  <script src="team-view.js"></script>
</body>
</html>
